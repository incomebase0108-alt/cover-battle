<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Cover Battle — LAN対戦 3D観戦 (Phase A)</title>
  <link rel="stylesheet" href="css/style.css?v=55" />
  <style>
    /* 3D版: 2D版のDOM骨格は client.js が前提にするため残し、見た目だけ差し替える
       （serialize-sync-review の注意: #game/#muteBtn/#lobby 等が無いと connect() 前に例外） */
    #game { display: none; }                 /* 2D canvas は使わない（クリック等の前提だけ残す） */
    #touchControls { display: none; }        /* Phase A は観戦のみ。操作UIは Phase B で復活 */
    /* 右上の2D用ボタン（🔊・🕹️標準）は3D観戦では使わない。端末によって幅も段数も変わり
       （🕹️標準は body.touch のときだけ出る）HUDと重なるので隠す。
       client.js が #muteBtn の存在を前提にするため、DOMは残して display:none にすること */
    .hud { display: none; }
    /* 試合が始まる前・キャラ読込中は3Dを描かないので、真っ黒だと壊れて見える。空の色を敷いておく */
    #stage3d { position: fixed; inset: 0; z-index: 0; background: #a8c8e8; }
    #stage3d canvas { display: block; }
    /* 右上のボタンは上で隠したので、あとは左上の「？」(left10+44=54px)だけ避ければよい。
       safe-area を足して、ノッチ端末でも上端に食い込まないようにする。 */
    #hud3d {
      position: fixed; top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: 10px; right: 10px; padding-left: 56px; z-index: 5; color: #fff;
      font: bold 14px system-ui, sans-serif; text-shadow: 0 1px 3px #000;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    }
    #hud3d button {
      pointer-events: auto; padding: 4px 10px; border-radius: 8px; border: 1px solid #456;
      background: rgba(13,17,23,0.75); color: #fff; font: bold 12px system-ui, sans-serif;
    }
    /* 空や砂地など明るい背景でも読めるよう、文字にも下地を敷く（影だけでは沈む） */
    #hud3d > span {
      background: rgba(13,17,23,0.6); padding: 2px 7px; border-radius: 6px;
    }
    #hud3dStatus { color: #ffd24a; }
    #hud3dStatus:empty { display: none; }
    /* スマホ幅: 文字と余白を詰め、飾りのタイトルは落として1〜2行に収める */
    @media (max-width: 600px) {
      #hud3d { font-size: 12px; gap: 6px; }
      #hud3d button { padding: 4px 8px; font-size: 11px; }
      #hud3dTitle { display: none; }
      #hud3dStatus { flex-basis: 100%; font-size: 11px; }
    }
    /* 3Dキャラ(GLB計13.5MB)の読み込み中は何も描けない。スマホだと待ち時間が長く、
       画面に何も出ないと「壊れた」と思われるので、中央に状況を出しておく */
    #boot3d {
      position: fixed; inset: 0; z-index: 8; display: flex; pointer-events: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      color: #17324d; font: bold 17px system-ui, sans-serif; text-align: center; padding: 20px;
    }
    #boot3d small { font-weight: 600; font-size: 13px; opacity: 0.75; }
    .hud { z-index: 6; }
    #lobby { z-index: 10; }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage3d"></div>
    <div id="hud3d">
      <span id="hud3dTitle">3D観戦</span>
      <span id="hud3dAlive">--</span>
      <span id="hud3dFps">--</span>
      <button id="btnView3d">視点:全体</button>
      <button id="btnShadow3d">影:低</button>
      <button id="btnLobby3d" class="hidden">ロビー</button>
      <span id="hud3dStatus"></span>
    </div>
    <div id="boot3d">3Dを準備しています…<small>侍のデータ（約13MB）を読み込み中</small></div>

    <canvas id="game" width="960" height="600"></canvas>

    <div class="hud" style="pointer-events:none;">
      <div class="hud-row" style="justify-content:flex-end;">
        <button id="btnCtrlSize" class="icon-btn touch-only" style="pointer-events:auto;" title="コントローラの大きさ">🕹️標準</button>
        <button id="muteBtn" class="icon-btn" style="pointer-events:auto;">🔊</button>
      </div>
    </div>

    <!-- Mobile touch controls（Phase Aでは非表示。client.jsのInput.initTouchの前提DOMとして残す） -->
    <div id="touchControls" class="touch-controls">
      <div id="joystick" class="joystick"><div id="knob" class="knob">移</div></div>
      <div id="aimStickEl" class="joystick aimpad"><div id="aimKnob" class="knob aimknob">攻</div></div>
      <div class="action-buttons">
        <button id="btnAbility" class="act ability">🎯<small>特殊</small></button>
        <button id="btnRally" class="act rally hidden">🚩<small>采配</small></button>
        <button id="btnWeapon" class="act weapon">🔫<small>武器</small></button>
        <button id="btnBomb" class="act bomb">💣<small>爆弾</small></button>
      </div>
    </div>

    <!-- Lobby / character select（観戦だけなら閉じてよい。参加すればPhase Bで操作予定） -->
    <div id="lobby" class="overlay">
      <div class="panel">
        <h1>LAN対戦 — 3D観戦</h1>
        <p class="subtitle">Phase A: 試合を3Dで観戦できます（操作はまだ2D版で）。スロットを取らなくても観戦できます。</p>
        <p><input id="nameInput" placeholder="名前" maxlength="12"
             style="padding:8px 12px;border-radius:8px;border:1px solid #345;background:#0d1117;color:#fff;font-size:16px;" /></p>
        <p id="netStatus" class="subtitle">サーバーに接続中…</p>
        <div class="lobby-cols">
          <div class="lobby-col"><h3 class="blue">青チーム</h3><div id="blueSlots" class="slot-list"></div></div>
          <div class="lobby-col"><h3 class="red">赤チーム</h3><div id="redSlots" class="slot-list"></div></div>
        </div>
        <div id="diffSelect" class="difficulty-select">
          <span class="diff-label">AI難易度</span>
          <div id="diffButtons" class="diff-buttons"></div>
        </div>
        <div id="stageSelect" class="difficulty-select">
          <span class="diff-label">ステージ</span>
          <div id="stageButtons" class="diff-buttons stage-buttons"></div>
        </div>
        <p id="startNote" class="subtitle">観戦だけならこのまま「観戦をはじめる」を押してください。</p>
        <button id="startMatchBtn" class="btn hidden">ゲーム開始</button>
        <button id="spectateBtn" class="btn">観戦をはじめる</button>
        <p class="subtitle" style="font-size:12px;">観戦操作：ドラッグ=視点回転 ・ ホイール=ズーム ・ 「視点」で追従キャラ切替</p>
      </div>
    </div>
  </div>

  <script src="js/vector.js?v=55"></script>
  <script src="js/config.js?v=55"></script>
  <script src="js/classes.js?v=55"></script>
  <script src="js/assets.js?v=55"></script>
  <script src="js/audio.js?v=55"></script>
  <script src="js/weapons.js?v=55"></script>
  <script src="js/input.js?v=55"></script>
  <script src="js/map.js?v=55"></script>
  <script src="js/beast.js?v=55"></script>
  <script src="js/chest.js?v=55"></script>
  <script src="js/net/render.js?v=55"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/utils/SkeletonUtils.js"></script>
  <script src="prototype/3d/proto-viewer.js?v=20260718b"></script>
  <script src="prototype/3d/samurai.js?v=20260718b"></script>
  <script src="js/net/render3d.js?v=20260718b"></script>

  <script src="js/net/client.js?v=20260718b"></script>
  <script src="js/help.js?v=55"></script>
  <script>
    // 「観戦をはじめる」= スロットを取らず観戦に入る。スマホ単体でもこれだけで完結させる。
    //  - 自分がホストでまだ試合が始まっていなければ開始も要求する（誰も始めないと駒が止まったまま）
    //  - client.js は lobby 通知のたびに「試合中 かつ 参加済み」でないとロビーを再表示するので、
    //    観戦中はこちらで閉じ続ける（参加していない観戦者はロビーを閉じられないため）
    //  - 試合が終わったら次を自動で開始する。計測中に駒が止まらない＝fpsが無効にならない
    const lobbyEl = document.getElementById('lobby');
    const spectateBtn = document.getElementById('spectateBtn');
    let spectating = false;
    spectateBtn.addEventListener('click', () => {
      spectating = true;
      lobbyEl.classList.add('hidden');
    });
    const lobbyBtn = document.getElementById('btnLobby3d');
    lobbyBtn.addEventListener('click', () => {          // スロットを取りたくなったら戻れる
      spectating = false;
      lobbyEl.classList.remove('hidden');
    });
    setInterval(() => {
      const C = window.NetControl;
      if (!C) return;
      spectateBtn.textContent = (C.isHost() && !C.isStarted())
        ? '試合を開始して観戦する' : '観戦をはじめる';
      lobbyBtn.classList.toggle('hidden', !spectating);
      if (!spectating) return;
      lobbyEl.classList.add('hidden');
      if (C.isHost() && !C.isStarted()) C.start();       // 開始・試合終了後の再開始をまとめて担う
    }, 500);
  </script>
</body>
</html>
