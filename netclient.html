<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Cover Battle — LAN対戦</title>
  <link rel="stylesheet" href="css/style.css?v=30" />
</head>
<body>
  <div id="app">
    <canvas id="game" width="960" height="600"></canvas>

    <div class="hud" style="pointer-events:none;">
      <div class="hud-row" style="justify-content:flex-end;">
        <button id="btnCtrlSize" class="icon-btn touch-only" style="pointer-events:auto;" title="コントローラの大きさ">🕹️標準</button>
        <button id="muteBtn" class="icon-btn" style="pointer-events:auto;">🔊</button>
      </div>
    </div>

    <!-- Mobile touch controls -->
    <div id="touchControls" class="touch-controls">
      <div id="joystick" class="joystick"><div id="knob" class="knob">移</div></div>
      <div id="aimStickEl" class="joystick aimpad"><div id="aimKnob" class="knob aimknob">攻</div></div>
      <div class="action-buttons">
        <button id="btnAbility" class="act ability">🎯<small>特殊</small></button>
        <button id="btnWeapon" class="act weapon">🔫<small>武器</small></button>
        <button id="btnBomb" class="act bomb">💣<small>爆弾</small></button>
      </div>
    </div>

    <!-- Lobby / character select -->
    <div id="lobby" class="overlay">
      <div class="panel">
        <h1>LAN対戦</h1>
        <p class="subtitle">同じWi-Fiの全員で参加。空きスロットはAIが操作します。</p>
        <p><input id="nameInput" placeholder="名前" maxlength="12"
             style="padding:8px 12px;border-radius:8px;border:1px solid #345;background:#0d1117;color:#fff;font-size:16px;" /></p>
        <p id="netStatus" class="subtitle">サーバーに接続中…</p>
        <div class="lobby-cols">
          <div class="lobby-col"><h3 class="blue">青チーム</h3><div id="blueSlots" class="slot-list"></div></div>
          <div class="lobby-col"><h3 class="red">赤チーム</h3><div id="redSlots" class="slot-list"></div></div>
        </div>
        <div id="diffSelect" class="difficulty-select">
          <span class="diff-label">AI難易度</span>
          <div id="diffButtons" class="diff-buttons"></div>
        </div>
        <div id="stageSelect" class="difficulty-select">
          <span class="diff-label">ステージ</span>
          <div id="stageButtons" class="diff-buttons stage-buttons"></div>
        </div>
        <p id="startNote" class="subtitle">上でスロット（キャラ）を選んでください。</p>
        <button id="startMatchBtn" class="btn hidden">ゲーム開始</button>
        <p class="subtitle" style="font-size:12px;">操作：左「移」で移動 ・ 右「攻」を倒した方向に照準＋射撃 ・ 爆弾💣 ・ 特殊🎯 ・ 武器🔫</p>
      </div>
    </div>
  </div>

  <script src="js/vector.js?v=30"></script>
  <script src="js/config.js?v=30"></script>
  <script src="js/classes.js?v=30"></script>
  <script src="js/assets.js?v=30"></script>
  <script src="js/audio.js?v=30"></script>
  <script src="js/weapons.js?v=30"></script>
  <script src="js/input.js?v=30"></script>
  <script src="js/map.js?v=30"></script>
  <script src="js/beast.js?v=30"></script>
  <script src="js/net/render.js?v=30"></script>
  <script src="js/net/client.js?v=30"></script>
  <script src="js/help.js?v=30"></script>
</body>
</html>
