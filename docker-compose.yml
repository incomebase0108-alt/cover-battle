# NAS で常時起動させるための Compose 設定（ビルド不要・最も確実）。
# 公式 node イメージを使い、このフォルダをそのまま動かす。
#   docker compose up -d     で起動（NAS再起動後も自動で立ち上がる）。
# 同じ Wi-Fi の端末から  http://<NASのIP>:8080/netclient.html  で参加。
#   例: http://192.168.0.16:8080/netclient.html
#
# ※ イメージをビルドして使いたい場合は Dockerfile があるので、下を
#   「build: .」に置き換えて image/working_dir/volumes/command を消せばOK。
services:
  cover-battle:
    image: node:20-alpine
    container_name: cover-battle
    working_dir: /app
    volumes:
      - ./:/app
    # 起動のたびに GitHub の最新(main)へ自動同期してから起動する。これで NAS の
    # Docker アプリで「再起動」を押すだけで最新版になる（PC/ターミナル不要）。
    # ・git が無ければ入れる / 所有者差異の警告を回避 / リポジトリでなければ現状のまま起動。
    # ・reset --hard origin/main で確実に一致（NAS側のローカル変更は破棄＝デプロイ専用前提）。
    command: >-
      sh -c "apk add --no-cache git >/dev/null 2>&1;
      git config --global --add safe.directory /app 2>/dev/null;
      (git -C /app fetch --depth=1 origin main && git -C /app reset --hard origin/main)
      || echo 'git未設定のため現在のファイルで起動';
      npm install --omit=dev && node server.js"
    ports:
      - "8080:8080"
    restart: unless-stopped
